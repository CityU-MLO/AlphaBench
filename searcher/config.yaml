# ============================================================================
# AlphaBench Searcher — Configuration
# ============================================================================
#
# Start modes (mutually exclusive, resolved in order):
#   1. Resume:    python start_search.py --resume results/final_pool.jsonl
#   2. Warm file: set searching.algo.seed_file  (or --seed-file flag)
#   3. Warm α158: python start_search.py --alpha158
#   4. Cold:      (default) LLM generates initial factors randomly
#
# Backtesting always routes through the FFO server.  No local backtest logic.
# ============================================================================

savedir: "./results/search_001"

# ── Search algorithm ─────────────────────────────────────────────────────────
searching:
  algo:
    name: ea              # "ea" | "cot" | "tot"
    seed_file: ""         # warm-start seed file (empty = cold start / --alpha158)

    param:                # algo-specific parameters (forwarded verbatim)
      # ── EA params ──
      rounds: 10          # generations
      N: 30               # new candidates per round
      mutation_rate: 0.4
      crossover_rate: 0.6
      pool_size: 30       # keep top N factors in pool
      seeds_top_k: 12     # seeds shown to LLM per round

      # ── CoT / ToT params (ignored for EA) ──
      # rounds: 10        # refinement rounds (CoT) / max tree depth (ToT)
      # N: 6              # candidates per node per depth (ToT only)
      # top_k: 3          # max survivors per ToT node

      enable_reason: true

  model:
    name: "deepseek-chat"
    base_url: "https://api.deepseek.com"
    key: "${DEEPSEEK_API_KEY}"   # or paste key directly
    temperature: 0.7

# ── Backtesting (FFO server) ─────────────────────────────────────────────────
backtesting:
  ffo_server: "127.0.0.1:19777"
  market: "csi300"
  benchmark: "SH000300"
  period_start: "2022-01-01"
  period_end: "2023-01-01"

  top_k: 30
  n_drop: 5

  fast: true    # true = IC metrics only (~1-2 s/factor, recommended)
                # false = full portfolio backtest (~10-30 s/factor)
  n_jobs: 4     # parallel evaluation workers
  timeout: 120  # per-factor timeout (seconds)
