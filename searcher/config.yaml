# ============================================================================
# AlphaBench Searcher — Configuration
# ============================================================================
#
# Start modes (mutually exclusive, resolved in order):
#   1. Resume:    python start_search.py --resume results/final_pool.jsonl
#   2. Warm file: set searching.algo.seed_file  (or --seed-file flag)
#   3. Warm α158: python start_search.py --alpha158
#   4. Cold:      (default) LLM generates initial factors randomly
#
# Backtesting always routes through the FFO server.  No local backtest logic.
# ============================================================================

savedir: "./results/search_001"

# ── Search algorithm ─────────────────────────────────────────────────────────
searching:
  algo:
    name: tot              # "ea" | "cot" | "tot"
    seed_file: ""         # warm-start seed file (empty = cold start / --alpha158)

    param:                # algo-specific parameters (forwarded verbatim)
      # ── EA params ──
      # rounds: 10          # generations
      # N: 20               # new candidates per round
      # mutation_rate: 0.5
      # crossover_rate: 0.5
      # pool_size: 30       # keep top N factors in pool
      # seeds_top_k: 10     # seeds shown to LLM per round

      # ── CoT / ToT params (ignored for EA) ──
      rounds: 10        # refinement rounds (CoT) / max tree depth (ToT)
      N: 6              # candidates per node per depth (ToT only)
      top_k: 3          # max survivors per ToT node

      enable_reason: true

  model:
    # Model name — routing (api_key, base_url) is resolved from config/api_keys.yaml.
    # Set all_in_one: true on a model entry there to route it via the All-in-One platform.
    # For local vLLM: set local: true and local_port in the benchmark config, or
    # pass --local / --local_port flags to start_search.py.
    name: "gpt-4.1-mini"

    temperature: 0.5

# ── Backtesting (FFO server) ─────────────────────────────────────────────────
backtesting:
  ffo_server: "127.0.0.1:19777"
  market: "csi300"
  benchmark: "SH000300"
  search_start: "2016-01-01"
  search_end: "2021-01-01"

  top_k: 30               # only used if not fast
  n_drop: 1

  fast: true    # true = IC metrics only (~1-2 s/factor, recommended)
                # false = full portfolio backtest (~10-30 s/factor)
  n_jobs: 4     # parallel evaluation workers
  timeout: 120  # per-factor timeout (seconds)

  accept_threshold: 0.0   # minimum RankIC to accept a factor into the pool
                          # set to -1.0 to disable filtering

# ── Verification / Validation ────────────────────────────────────────────────
# During searching, factors are evaluated on BOTH search and val periods.
# Only search-period metrics are used for algorithm decisions (no data leakage).
# Val-period metrics are saved alongside for out-of-sample analysis.
# After searching, use run_test_backtest.py to evaluate on the test period.
verification:
  enabled: true
  auto_verify: true
  search_start: "2016-01-01"
  search_end: "2021-01-01"
  val_start: "2021-01-01"
  val_end: "2022-01-01"
  test_start: "2022-01-01"
  test_end: "2025-01-01"
  verification_forward_n: 1
